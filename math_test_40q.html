<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Grade 3 FAST Math - Unit 15 Practice</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;height:100%}
body{font-family:Arial,Helvetica,sans-serif;background:#e8eaf0;color:#111;height:100%;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;-webkit-appearance:none}
#topBar{background:#fff;border-bottom:2px solid #bbb;padding:5px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;font-size:13px}
#topBar .title{font-weight:bold;font-size:13px;flex:1;min-width:180px}
#topBar .user{font-size:11.5px;color:#555;white-space:nowrap}
#helpBtn{background:#1a4fa0;color:#fff;border:none;border-radius:4px;padding:2px 10px;font-size:12px;font-weight:bold}
#teacherBtn{background:#7a3a00;color:#fff;border:none;border-radius:4px;padding:2px 10px;font-size:12px;font-weight:bold;cursor:pointer}
#toolbar{background:#fff;border-bottom:2px solid #ccc;padding:4px 10px;display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;font-size:10px;color:#333;padding:3px 6px;border-radius:4px;min-height:38px;justify-content:center}
.tbtn:hover{background:#eee}
.tbtn svg{width:19px;height:19px}
.tbtn.nav-t{background:#e4f0e4;border:1px solid #5a9a5a}
.tbtn.save-t{background:#e4f0e4;border:1px solid #5a9a5a}
.tbtn.pause-t{background:#fff3e0;border:1px solid #d4861a}
#tbSpacer{flex:1}
#qStrip{background:#fff;border-bottom:1px solid #ccc;padding:4px 10px;display:flex;align-items:center;gap:3px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.qDot{min-width:32px;height:32px;border:1.5px solid #aaa;background:#fff;border-radius:4px;font-size:11.5px;font-weight:bold;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;position:relative}
.qDot:hover{background:#dde8ff}
.qDot.active{background:#1a4fa0;color:#fff;border-color:#1a4fa0}
.qDot.done::after{content:'✓';position:absolute;bottom:1px;right:2px;font-size:7px;color:#2a8a2a;line-height:1}
.qDot.active.done::after{color:#90ee90}
.qDotSep{min-width:10px;height:32px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:16px;pointer-events:none;flex-shrink:0;font-weight:bold}
#main{display:flex;flex:1 1 0;min-height:0;overflow:hidden}
/* Full-width single panel — no passage panel */
#qPanel{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;background:#fff;height:100%}
#qHeader{background:#1a4fa0;color:#fff;padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#qNum{font-size:21px;font-weight:bold}
#qMenuBtn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:4px;padding:3px 8px;font-size:16px}
#qMeta{padding:3px 14px;font-size:11px;color:#666;border-bottom:1px solid #e0e0e0;background:#fafafa;display:flex;gap:10px;flex-shrink:0}
#qBody{flex:1 1 0;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:20px 28px;min-height:0}
.qPrompt{font-size:15px;line-height:1.55;margin-bottom:16px;max-width:720px}
.qPrompt strong{font-weight:bold}
/* Stimulus box — replaces passage panel, sits above choices */
.stimulus{background:#f4f6fa;border:1.5px solid #c8d4ea;border-radius:6px;padding:12px 16px;margin-bottom:18px;font-size:14px;line-height:1.7;max-width:720px}
.stimulus .stim-label{font-size:11px;font-weight:bold;color:#1a4fa0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stimulus table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:4px}
.stimulus table th{background:#1a4fa0;color:#fff;padding:6px 10px;text-align:center;border:1px solid #aaa;font-weight:bold}
.stimulus table td{border:1px solid #bbb;padding:6px 10px;text-align:center}
.stimulus table tr:nth-child(even) td{background:#eef2ff}
.stimulus table td:first-child{text-align:left;font-weight:bold}
.qExcerpt{background:#f4f6fa;border-left:3px solid #1a4fa0;padding:9px 13px;margin-bottom:14px;line-height:1.6;border-radius:0 4px 4px 0;font-size:14px;max-width:720px}
.partLabel{font-weight:bold;color:#1a4fa0;margin-bottom:6px;font-size:14.5px}
.partDivider{border:none;border-top:2px dashed #ccc;margin:16px 0;max-width:720px}
.choices{display:flex;flex-direction:column;gap:8px;max-width:680px}
.choice{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border:1.5px solid #ccc;border-radius:6px;cursor:pointer;transition:all .13s;background:#fff;text-align:left;width:100%;font-size:14.5px;line-height:1.45;font-family:Arial,Helvetica,sans-serif;min-height:46px}
.choice:hover{background:#eef2ff;border-color:#7090d0}
.choice.sel{background:#dde8ff;border-color:#1a4fa0}
.choice.correct{background:#d4f5d4;border-color:#2a8a2a}
.choice.wrong{background:#ffd8d8;border-color:#cc3333}
.choice:disabled{cursor:default}
.cMarker{width:17px;height:17px;border:2px solid #999;border-radius:50%;flex-shrink:0;margin-top:2px;background:#fff;display:flex;align-items:center;justify-content:center}
.choice.sel .cMarker{background:#1a4fa0;border-color:#1a4fa0}
.choice.sel .cMarker::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%;display:block}
.cMarker.chk{border-radius:3px}
.choice.sel .cMarker.chk::after{content:'✓';font-size:10px;color:#fff;font-weight:bold;border-radius:0;width:auto;height:auto;background:none}
.cLetter{font-weight:bold;color:#1a4fa0;min-width:19px;font-size:14.5px}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 2px;font-size:14.5px;line-height:1.1}
.frac .num,.frac .den{display:block;text-align:center;padding:0 3px}
.frac .bar{border-top:1.5px solid currentColor;width:100%}
.tblQ{width:100%;max-width:680px;border-collapse:collapse;font-size:13.5px;margin-top:5px}
.tblQ th{background:#1a4fa0;color:#fff;padding:7px 9px;text-align:center;border:1px solid #aaa;font-weight:bold}
.tblQ td{border:1px solid #bbb;padding:7px 9px;text-align:center;vertical-align:middle}
.tblQ td:first-child{text-align:left;font-weight:bold;font-size:13px}
.tblQ tr:nth-child(even) td{background:#f0f4ff}
.tblBub{width:20px;height:20px;border:2px solid #888;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;transition:all .13s;font-size:11.5px;font-weight:bold;color:#555}
.tblBub:hover{border-color:#1a4fa0;background:#eef}
.tblBub.sel{background:#1a4fa0;border-color:#1a4fa0;color:#fff}
.tblBub.correct{background:#2a8a2a;border-color:#2a8a2a;color:#fff}
.tblBub.wrong{background:#cc3333;border-color:#cc3333;color:#fff}
.feedback{margin-top:14px;padding:12px 14px;border-radius:6px;font-size:13.5px;line-height:1.5;max-width:680px}
.feedback.ok{background:#d4f5d4;border:1px solid #2a8a2a;color:#1a5c1a}
.feedback.bad{background:#ffd8d8;border:1px solid #cc3333;color:#7a0000}
#botNav{padding:9px 16px;background:#f2f2f4;border-top:1px solid #ddd;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.navBtn{background:#1a4fa0;color:#fff;border:none;padding:10px 24px;border-radius:5px;font-size:14px;font-weight:bold;min-height:44px;min-width:84px;transition:background .13s}
.navBtn:hover{background:#153d80}
.navBtn:active{background:#0e2d60}
.navBtn:disabled{background:#aaa;cursor:default}
#saveInfo{font-size:11.5px;color:#666;text-align:center}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.76);color:#fff;padding:8px 20px;border-radius:22px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .25s;font-family:Arial,sans-serif}
#notesOverlay{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.45)}
#notesBox{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:10px;width:min(500px,92vw);max-height:70vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.35)}
#notesHeader{background:#1a4fa0;color:#fff;padding:10px 16px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center;font-weight:bold;font-size:15px}
#notesClose{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:4px;padding:3px 10px;font-size:16px;cursor:pointer}
#notesArea{flex:1;padding:14px;overflow-y:auto}
#notesTxt{width:100%;height:180px;border:1.5px solid #ccc;border-radius:6px;padding:10px;font-family:Arial,sans-serif;font-size:14px;resize:vertical;outline:none}
#notesFooter{padding:10px 14px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px}
.nBtn{padding:8px 18px;border:none;border-radius:5px;font-size:14px;font-weight:bold;cursor:pointer}
#notesClear{background:#f0f0f0;color:#333}
#notesSave{background:#1a4fa0;color:#fff}
#lrBar{display:none;position:fixed;left:0;right:0;z-index:700;height:36px;background:rgba(255,220,0,.35);border-top:2px solid rgba(200,160,0,.5);border-bottom:2px solid rgba(200,160,0,.5);pointer-events:none}
#lrControls{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:710;background:#1a4fa0;border-radius:24px;padding:6px 14px;display:none;gap:10px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.lrBtn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:16px;padding:5px 14px;font-size:13px;font-weight:bold;cursor:pointer}
#lrCloseBtn{background:rgba(255,100,100,.4)}
@media(max-width:600px){#topBar .title{font-size:11px}.tbtn{font-size:9px;padding:2px 4px}#qBody{padding:14px 14px}.qPrompt,.choice{font-size:13.5px}}
</style>
</head>
<body>

<div id="topBar">
  <span class="title">Grade 3 FAST Math &nbsp;|&nbsp; Unit 15 — 40-Question Practice</span>
  <span class="user">GUEST, STUDENT &nbsp; GUEST SESSION</span>
  <button id="helpBtn">?</button>
  <button id="teacherBtn" onclick="teacherAccess()">Teacher</button>
</div>

<div id="toolbar">
  <button class="tbtn nav-t" onclick="goBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><polyline points="12,8 8,12 12,16"/><line x1="16" y1="12" x2="8" y2="12"/></svg>Back</button>
  <button class="tbtn nav-t" onclick="goNext()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><polyline points="12,8 16,12 12,16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Next</button>
  <button class="tbtn save-t" onclick="doSave()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save</button>
  <button class="tbtn pause-t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="10" y1="15" x2="10" y2="9"/><line x1="14" y1="15" x2="14" y2="9"/></svg>Pause</button>
  <div id="tbSpacer"></div>
  <button class="tbtn" onclick="openNotes()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z"/></svg>Notes</button>
  <button class="tbtn" onclick="toggleLR()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>Line Reader</button>
  <button class="tbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>Zoom Out</button>
  <button class="tbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>Zoom In</button>
</div>

<div id="qStrip"></div>

<div id="main">
  <div id="qPanel">
    <div id="qHeader"><span id="qNum">1</span><button id="qMenuBtn">&#x2630;</button></div>
    <div id="qMeta"><span>GUEST, STUDENT</span><span id="saveTime"></span></div>
    <div id="qBody"></div>
    <div id="botNav">
      <button class="navBtn" id="btnBack" onclick="goBack()">&#x25C4; Back</button>
      <div id="saveInfo">Not yet saved</div>
      <button class="navBtn" id="btnNext" onclick="goNext()">Next &#x25BA;</button>
    </div>
  </div>
</div>

<div id="notesOverlay" onclick="if(event.target===this)closeNotes()">
  <div id="notesBox">
    <div id="notesHeader"><span>📝 My Notes</span><button id="notesClose" onclick="closeNotes()">✕</button></div>
    <div id="notesArea"><textarea id="notesTxt" placeholder="Type your notes here..."></textarea></div>
    <div id="notesFooter"><button class="nBtn" id="notesClear" onclick="clearNotes()">Clear</button><button class="nBtn" id="notesSave" onclick="saveNotes()">Save &amp; Close</button></div>
  </div>
</div>
<div id="lrBar"></div>

  <button class="lrBtn" onclick="lrMove(-30)">▲ Up</button>
  <button class="lrBtn" onclick="lrMove(30)">▼ Down</button>
  <button class="lrBtn" id="lrCloseBtn" onclick="toggleLR()">✕ Close</button>
</div>
<div id="toast"></div>

<script>
let cur=0,reviewMode=false,lastAttempt=null;
const answers={};

const SEG=[
  {qs:[0,9],  label:`Q1–10 · MA.3.NSO.2.3`,color:`#1a4fa0`},
  {qs:[10,19],label:`Q11–20 · MA.3.AR.1.1`, color:`#5a3a00`},
  {qs:[20,29],label:`Q21–30 · MA.3.FR.1.3`, color:`#1a6a40`},
  {qs:[30,39],label:`Q31–40 · MA.3.GR.1.2`, color:`#6a1a6a`}
];
function segFor(i){return SEG.find(s=>i>=s.qs[0]&&i<=s.qs[1]);}

// ─────────────────────────────────────────────────────────
//  40 QUESTIONS
// ─────────────────────────────────────────────────────────
const Qs=[

// ══ SEGMENT 1 · Q1–10 · MA.3.NSO.2.3 ══
// Multiply a 1-digit number by a multiple of 10 or 100, up to 900

{id:1,type:`mc`,
 prompt:`The school store has 6 boxes of pencils. Each box holds 40 pencils. How many pencils are there in all?`,
 choices:[`46`,`240`,`2,400`,`64`],correct:1,
 explain:`6 × 40 = 6 × 4 × 10 = 24 × 10 = 240.`},

{id:2,type:`mc`,
 prompt:`A teacher orders 7 packs of erasers. Each pack has 30 erasers. How many erasers did the teacher order?`,
 choices:[`37`,`21`,`210`,`2,100`],correct:2,
 explain:`7 × 30 = 7 × 3 × 10 = 21 × 10 = 210.`},

{id:3,type:`mc`,
 prompt:`A supply closet received 4 shipments of notebooks. Each shipment had 200 notebooks. How many notebooks were delivered in all?`,
 choices:[`204`,`80`,`800`,`8,000`],correct:2,
 explain:`4 × 200 = 4 × 2 × 100 = 8 × 100 = 800.`},

{id:4,type:`mc`,
 prompt:`Which equation has a product of 560?`,
 choices:[`7 × 80`,`8 × 60`,`7 × 800`,`6 × 80`],correct:0,
 explain:`7 × 80 = 7 × 8 × 10 = 56 × 10 = 560. Check: 8 × 60 = 480, 7 × 800 = 5,600, 6 × 80 = 480.`},

{id:5,type:`mc`,
 prompt:`A school shelf holds 90 books. There are 5 shelves. How many books are there in all?`,
 choices:[`45`,`95`,`405`,`450`],correct:3,
 explain:`5 × 90 = 5 × 9 × 10 = 45 × 10 = 450.`},

{id:6,type:`mc`,
 prompt:`Each of 8 classrooms gets 300 sheets of paper. How many sheets of paper are there in all?`,
 choices:[`308`,`240`,`2,400`,`24,000`],correct:2,
 explain:`8 × 300 = 8 × 3 × 100 = 24 × 100 = 2,400.`},

{id:7,type:`mc`,
 prompt:`What is the missing number? &nbsp; 9 × ___ = 6,300`,
 choices:[`7`,`70`,`700`,`7,000`],correct:2,
 explain:`9 × 700 = 9 × 7 × 100 = 63 × 100 = 6,300. The missing number is 700.`},

{id:8,type:`table`,
 prompt:`Select the correct product for each expression.`,
 rows:[
   {label:`3 × 80`,  cols:[`24`,`240`,`2,400`], correct:1},
   {label:`6 × 700`, cols:[`42`,`420`,`4,200`], correct:2},
   {label:`5 × 600`, cols:[`300`,`3,000`,`30,000`], correct:1}
 ],
 explain:`3 × 80 = 240. &nbsp; 6 × 700 = 4,200. &nbsp; 5 × 600 = 3,000.`},

{id:9,type:`multi`,
 prompt:`Select <strong>two</strong> expressions that equal <strong>3,600</strong>.`,
 choices:[`4 × 900`,`6 × 60`,`9 × 400`,`3 × 120`,`7 × 500`],correct:[0,2],
 explain:`4 × 900 = 3,600 ✓ &nbsp; 9 × 400 = 3,600 ✓. Check: 6 × 60 = 360, 3 × 120 = 360, 7 × 500 = 3,500.`},

{id:10,type:`partAB`,
 partA:{
   prompt:`Part A — A library has 9 shelves. Each shelf holds 60 books. Which expression gives the total number of books?`,
   choices:[`9 + 60`,`9 × 6`,`9 × 60`,`90 × 60`],correct:2},
 partB:{
   prompt:`Part B — What is the total number of books?`,
   choices:[`54`,`504`,`540`,`5,400`],correct:2},
 explain:`Part A: 9 × 60 is correct. Part B: 9 × 60 = 9 × 6 × 10 = 54 × 10 = 540.`},

// ══ SEGMENT 2 · Q11–20 · MA.3.AR.1.1 ══
// Distributive property; multiply 1-digit × 2-digit

{id:11,type:`mc`,
 prompt:`Which expression uses the distributive property to find 6 × 14?`,
 choices:[`6 + 14`,`(6 × 10) + (6 × 4)`,`(6 + 10) × (6 + 4)`,`6 × 1 × 4`],correct:1,
 explain:`6 × 14 = 6 × (10 + 4) = (6 × 10) + (6 × 4) = 60 + 24 = 84.`},

{id:12,type:`mc`,
 prompt:`What is 6 × 14?`,
 choices:[`74`,`80`,`84`,`96`],correct:2,
 explain:`6 × 14 = (6 × 10) + (6 × 4) = 60 + 24 = 84.`},

{id:13,type:`mc`,
 prompt:`A student writes: (5 × 20) + (5 × 7) = 5 × ___. What is the missing number?`,
 choices:[`20`,`27`,`35`,`7`],correct:1,
 explain:`(5 × 20) + (5 × 7) = 5 × (20 + 7) = 5 × 27. The missing number is 27.`},

{id:14,type:`mc`,
 prompt:`What is 8 × 23?`,
 choices:[`164`,`174`,`184`,`194`],correct:2,
 explain:`8 × 23 = (8 × 20) + (8 × 3) = 160 + 24 = 184.`},

{id:15,type:`mc`,
 prompt:`A farmer plants 7 rows with 32 plants each. He solves (7 × 30) + (7 × 2). What is the total number of plants?`,
 choices:[`196`,`214`,`220`,`224`],correct:3,
 explain:`(7 × 30) + (7 × 2) = 210 + 14 = 224 plants.`},

{id:16,type:`mc`,
 prompt:`Mia says 3 × 47 = (3 × 40) + (3 × 7). What is the product?`,
 choices:[`121`,`131`,`141`,`151`],correct:2,
 explain:`(3 × 40) + (3 × 7) = 120 + 21 = 141.`},

{id:17,type:`partAB`,
 partA:{
   prompt:`Part A — Which expression equals 9 × 18 using the distributive property?`,
   choices:[`(9 + 10) × (9 + 8)`,`(9 × 10) + (9 × 8)`,`9 + 18`,`(9 × 1) + 8`],correct:1},
 partB:{
   prompt:`Part B — What is 9 × 18?`,
   choices:[`152`,`160`,`162`,`172`],correct:2},
 explain:`Part A: 9 × 18 = (9 × 10) + (9 × 8). Part B: 90 + 72 = 162.`},

{id:18,type:`multi`,
 prompt:`Select <strong>two</strong> expressions that equal <strong>4 × 26</strong>.`,
 choices:[`(4 × 20) + (4 × 6)`,`4 × 20 + 6`,`(4 × 25) + (4 × 1)`,`4 + 26`,`(4 × 30) − (4 × 4)`],correct:[0,2],
 explain:`A: (4×20)+(4×6) = 80+24 = 104 ✓. &nbsp; C: (4×25)+(4×1) = 100+4 = 104 ✓. Both equal 4 × 26 = 104.`},

{id:19,type:`table`,
 prompt:`Use the distributive property. Select the correct product for each expression.`,
 rows:[
   {label:`5 × 19`,cols:[`85`,`95`,`105`],correct:1},
   {label:`6 × 22`,cols:[`122`,`132`,`142`],correct:1},
   {label:`4 × 35`,cols:[`120`,`130`,`140`],correct:2}
 ],
 explain:`5 × 19 = (5×10)+(5×9) = 95. &nbsp; 6 × 22 = (6×20)+(6×2) = 132. &nbsp; 4 × 35 = (4×30)+(4×5) = 140.`},

{id:20,type:`mc`,
 prompt:`Which property is shown by the equation below?<br><br>7 × 15 = (7 × 10) + (7 × 5)`,
 choices:[`Commutative property`,`Associative property`,`Distributive property`,`Identity property`],correct:2,
 explain:`The distributive property states a × (b + c) = (a × b) + (a × c). The equation breaks 15 into (10 + 5) and distributes the 7.`},

// ══ SEGMENT 3 · Q21–30 · MA.3.FR.1.3 ══
// Read and write fractions, including fractions greater than 1

{id:21,type:`mc`,
 prompt:`Each pie is cut into 6 equal slices. Jaylen ate 11 slices. Which fraction shows how many pies Jaylen ate?`,
 choices:[`<span class="frac"><span class="num">6</span><span class="bar"></span><span class="den">11</span></span>`,

// ─── HELPERS ───
function isCorrect(q,a){
  if(a===undefined||a===null)return false;
  if(q.type==='mc')return a===q.correct;
  if(q.type==='multi')return[...a].sort().join()===[...q.correct].sort().join();
  if(q.type==='partAB')return a&&a.a===q.partA.correct&&a.b===q.partB.correct;
  if(q.type==='table')return q.rows.every((_,ri)=>a&&a[ri]===q.rows[ri].correct);
  return false;
}
function isAnswered(q,a){
  if(a===undefined||a===null)return false;
  if(q.type==='multi')return a.length>0;
  if(q.type==='partAB')return a&&a.a!==undefined&&a.b!==undefined;
  if(q.type==='table')return Object.keys(a).length>=q.rows.length;
  return true;
}

// ─── STRIP ───
function renderStrip(){
  const s=document.getElementById('qStrip');
  s.innerHTML='';
  if(reviewMode)return;
  Qs.forEach((q,i)=>{
    if(i>0&&i%10===0){const sep=document.createElement('span');sep.className='qDotSep';sep.textContent='|';s.appendChild(sep);}
    const d=document.createElement('button');
    d.className='qDot'+(i===cur?' active':'')+(isAnswered(q,answers[i])?' done':'');
    d.textContent=q.id;
    d.onclick=()=>{cur=i;render();};
    s.appendChild(d);
  });
}

// ─── RENDER QUESTION ───
function renderQ(q,idx,rev){
  const a=answers[idx];
  let h='';
  if(q.type==='mc'){
    if(q.excerpt)h+=`<div class="qExcerpt">${q.excerpt}</div>`;
    h+=`<div class="qPrompt">${q.prompt}</div><div class="choices">`;
    q.choices.forEach((c,i)=>{
      let cl=a===i?' sel':'';
      if(rev)cl=i===q.correct?' correct':(a===i?' wrong':'');
      h+=`<button class="choice${cl}" ${rev?'disabled':''} onclick="pMC(${idx},${i})"><div class="cMarker"></div><span class="cLetter">&#${9398+i};</span><span>${c}</span></button>`;
    });
    h+='</div>';
  } else if(q.type==='multi'){
    h+=`<div class="qPrompt">${q.prompt}</div><div class="choices">`;
    const sel=a||[];
    q.choices.forEach((c,i)=>{
      let cl=sel.includes(i)?' sel':'';
      if(rev)cl=q.correct.includes(i)?' correct':(sel.includes(i)?' wrong':'');
      h+=`<button class="choice${cl}" ${rev?'disabled':''} onclick="pMulti(${idx},${i})"><div class="cMarker chk"></div><span>${c}</span></button>`;
    });
    h+='</div>';
  } else if(q.type==='partAB'){
    h+=`<div class="partLabel">Part A</div><div class="qPrompt">${q.partA.prompt}</div><div class="choices">`;
    q.partA.choices.forEach((c,i)=>{
      let cl=(a&&a.a===i)?' sel':'';
      if(rev)cl=i===q.partA.correct?' correct':((a&&a.a===i)?' wrong':'');
      h+=`<button class="choice${cl}" ${rev?'disabled':''} onclick="pA(${idx},${i})"><div class="cMarker"></div><span class="cLetter">&#${9398+i};</span><span>${c}</span></button>`;
    });
    h+=`</div><hr class="partDivider"><div class="partLabel">Part B</div><div class="qPrompt">${q.partB.prompt}</div><div class="choices">`;
    q.partB.choices.forEach((c,i)=>{
      let cl=(a&&a.b===i)?' sel':'';
      if(rev)cl=i===q.partB.correct?' correct':((a&&a.b===i)?' wrong':'');
      h+=`<button class="choice${cl}" ${rev?'disabled':''} onclick="pB(${idx},${i})"><div class="cMarker"></div><span class="cLetter">&#${9398+i};</span><span>${c}</span></button>`;
    });
    h+='</div>';
  } else if(q.type==='table'){
    h+=`<div class="qPrompt">${q.prompt}</div><table class="tblQ"><thead><tr><th></th>`;
    q.rows[0].cols.forEach(c=>{h+=`<th>${c}</th>`;});
    h+=`</tr></thead><tbody>`;
    const tA=a||{};
    q.rows.forEach((row,ri)=>{
      h+=`<tr><td>${row.label}</td>`;
      row.cols.forEach((c,ci)=>{
        const sel=tA[ri]===ci;
        let cl=sel?' sel':'';
        if(rev)cl=ci===row.correct?' correct':(sel?' wrong':'');
        const clk=rev?'':` onclick="pTbl(${idx},${ri},${ci})"`;
        h+=`<td><span class="tblBub${cl}"${clk}>${String.fromCharCode(65+ri*row.cols.length+ci)}</span></td>`;
      });
      h+='</tr>';
    });
    h+='</tbody></table>';
  }
  if(rev){
    const ok=isCorrect(q,a);
    h+=`<div class="feedback ${ok?'ok':'bad'}">${ok?'<strong>✓ Correct!</strong> ':'<strong>✗ Not quite.</strong> '}${q.explain}</div>`;
  }
  return h;
}

// ─── MAIN RENDER ───
function render(){
  if(reviewMode){renderReview(lastAttempt);return;}
  renderStrip();
  const q=Qs[cur];
  document.getElementById('qNum').textContent=q.id;
  document.getElementById('btnBack').disabled=cur===0;
  const isLast=cur===Qs.length-1;
  const btn=document.getElementById('btnNext');
  btn.textContent=isLast?'Submit ▶':'Next ▶';
  btn.style.background=isLast?'#2a8a2a':'';
  const body=document.getElementById('qBody');
  body.innerHTML=renderQ(q,cur,false);
  body.scrollTop=0;
}

// ─── TEACHER PIN + LOG ───
const TEST_ID=document.title.replace(/[^a-zA-Z0-9]/g,'_');
const LOG_KEY='fastmath_log_'+TEST_ID;
const TEACHER_PIN='1234';

function teacherAccess(){
  const pin=prompt('Enter teacher PIN to view attempt log:');
  if(pin===null)return;
  if(pin===TEACHER_PIN){showTeacherLog();}
  else{alert('Incorrect PIN. Please try again.');}
}
(function(){
  const k={};
  document.addEventListener('keydown',e=>{k[e.key.toUpperCase()]=true;if(k['T']&&k['E']&&k['A'])teacherAccess();});
  document.addEventListener('keyup',e=>{delete k[e.key.toUpperCase()];});
})();

function getLog(){try{return JSON.parse(localStorage.getItem(LOG_KEY)||'[]');}catch(e){return[];}}
function saveAttempt(score,total,snap){
  const log=getLog();
  const a={attemptNum:log.length+1,timestamp:new Date().toISOString(),score,total,pct:Math.round(score/total*100),answers:snap};
  log.push(a);localStorage.setItem(LOG_KEY,JSON.stringify(log));return a;
}
function showTeacherLog(){
  const log=getLog();
  if(!log.length){alert('No attempts recorded yet for:\n'+TEST_ID);return;}
  let msg='=== ATTEMPT LOG ===\n'+TEST_ID+'\n\n';
  log.forEach(a=>{
    const d=new Date(a.timestamp);
    msg+=`Attempt #${a.attemptNum}  |  ${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}  |  Score: ${a.score}/${a.total} (${a.pct}%)\n`;
    SEG.forEach(s=>{
      const idxs=Qs.map((q,i)=>i).filter(i=>i>=s.qs[0]&&i<=s.qs[1]);
      const sc=idxs.filter(i=>isCorrect(Qs[i],a.answers[i])).length;
      msg+=`  ${s.label}: ${sc}/${idxs.length}\n`;
    });
    msg+='\n';
  });
  if(log.length>1){
    msg+='⚠️  '+log.length+' attempts submitted.';
    if(log[log.length-1].score>log[0].score)
      msg+='\n⚠️  Score improved: '+log[0].score+'/'+log[0].total+' → '+log[log.length-1].score+'/'+log[log.length-1].total;
  }
  alert(msg);
}

// ─── REVIEW ───
function renderReview(attemptData){
  document.getElementById('qStrip').innerHTML='';
  document.getElementById('qNum').textContent='✓';
  const bB=document.getElementById('btnBack'),bN=document.getElementById('btnNext');
  bB.textContent='🔒 Locked';bB.disabled=true;bB.style.background='#aaa';
  bN.textContent='Done ✓';bN.style.background='#555';
  bN.onclick=()=>showToast('Test complete. Your answers have been recorded.');
  const{score,total,pct,attemptNum,timestamp}=attemptData;
  const band=pct>=80?'#90ff90':pct>=60?'#ffd080':'#ff9090';
  const segScores=SEG.map(s=>{
    const idxs=Qs.map((q,i)=>i).filter(i=>i>=s.qs[0]&&i<=s.qs[1]);
    const sc=idxs.filter(i=>isCorrect(Qs[i],answers[i])).length;
    return{label:s.label,sc,tot:idxs.length,color:s.color};
  });
  let h=`<div style="background:#1a4fa0;color:#fff;padding:16px;border-radius:8px;margin-bottom:20px;">
    <div style="font-size:17px;font-weight:bold;margin-bottom:4px;">Test Complete — Attempt #${attemptNum}</div>
    <div style="font-size:32px;font-weight:bold;color:${band}">${score} / ${total}</div>
    <div style="font-size:13px;margin-top:3px;opacity:.9;">${pct}% correct &nbsp;·&nbsp; ${new Date(timestamp).toLocaleDateString()} ${new Date(timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">`;
  segScores.forEach(ss=>{
    const c=ss.sc===ss.tot?'#90ff90':ss.sc>=ss.tot/2?'#ffd080':'#ff9090';
    h+=`<div style="background:rgba(255,255,255,.15);border-radius:6px;padding:6px 10px;font-size:12px;"><div style="font-weight:bold;color:${c}">${ss.sc}/${ss.tot}</div><div style="opacity:.8;font-size:10.5px;">${ss.label}</div></div>`;
  });
  h+=`</div><div style="margin-top:10px;padding:8px 12px;background:rgba(255,255,255,.15);border-radius:6px;font-size:12.5px;line-height:1.6;">
    🔒 Your answers are now locked and cannot be changed.<br>
    ${attemptNum>1?`<span style="color:#ffd080;font-weight:bold;">⚠️ This is attempt #${attemptNum}. Your teacher can see all attempts.</span>`:'Your teacher has a record of this submission.'}
  </div></div>
  <div style="padding:8px 12px;background:#fff8e1;border:1px solid #f0c040;border-radius:6px;margin-bottom:16px;font-size:13px;color:#7a5800;">
    📖 <strong>Review below</strong> — read the explanations for any questions you missed.
  </div>`;
  let lastSeg=-1;
  Qs.forEach((q,i)=>{
    const si=SEG.findIndex(s=>i>=s.qs[0]&&i<=s.qs[1]);
    if(si!==lastSeg){
      h+=`<div style="margin:18px 0 10px;padding:8px 14px;background:${SEG[si].color};color:#fff;border-radius:6px;font-weight:bold;font-size:13px;">${SEG[si].label}</div>`;
      lastSeg=si;
    }
    const ok=isCorrect(q,answers[i]);
    const tl=q.type==='mc'?'Multiple Choice':q.type==='multi'?'Select Two':q.type==='partAB'?'Part A / Part B':'Bubble Table';
    h+=`<div style="margin-bottom:22px;padding:13px;border:2px solid ${ok?'#2a8a2a':'#cc3333'};border-radius:8px;background:${ok?'#f6fff6':'#fff6f6'}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <span style="background:${ok?'#2a8a2a':'#cc3333'};color:#fff;font-weight:bold;font-size:13px;padding:3px 10px;border-radius:20px;">Q${q.id} — ${ok?'✓ Correct':'✗ Incorrect'}</span>
        <span style="font-size:12px;color:#555;font-style:italic;">${tl}</span>
      </div>${renderQ(q,i,true)}</div>`;
  });
  const body=document.getElementById('qBody');
  body.innerHTML=h;body.scrollTop=0;stamp();
}

// ─── HANDLERS ───
function pMC(idx,i){answers[idx]=i;if(!reviewMode)render();}
function pA(idx,i){if(!answers[idx])answers[idx]={};answers[idx].a=i;if(!reviewMode)render();}
function pB(idx,i){if(!answers[idx])answers[idx]={};answers[idx].b=i;if(!reviewMode)render();}
function pMulti(idx,i){if(!answers[idx])answers[idx]=[];const p=answers[idx].indexOf(i);p===-1?answers[idx].push(i):answers[idx].splice(p,1);if(!reviewMode)render();}
function pTbl(idx,ri,ci){if(!answers[idx])answers[idx]={};answers[idx][ri]=ci;if(!reviewMode)render();}
function goBack(){if(reviewMode){showToast('🔒 Test submitted — answers are locked.');return;}if(cur>0){cur--;render();}}
function goNext(){
  if(reviewMode){showToast('🔒 Test complete. Answers are locked.');return;}
  if(cur<Qs.length-1){cur++;render();return;}
  const miss=Qs.filter((q,i)=>!isAnswered(q,answers[i])).length;
  if(miss>0){showToast(`${miss} question(s) not yet answered.`);return;}
  if(!confirm('Submit your test? Your answers will be LOCKED and cannot be changed after this.'))return;
  reviewMode=true;
  const score=Qs.filter((q,i)=>isCorrect(q,answers[i])).length;
  lastAttempt=saveAttempt(score,Qs.length,JSON.parse(JSON.stringify(answers)));
  renderReview(lastAttempt);
}
function stamp(){
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('saveTime').textContent='Last Saved: '+t;
  document.getElementById('saveInfo').textContent='Last saved: '+t;
}
function doSave(){stamp();showToast('Saved!');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2600);}

// ─── NOTES ───
const NOTES_KEY='fastmath_notes_'+TEST_ID;
function openNotes(){document.getElementById('notesTxt').value=localStorage.getItem(NOTES_KEY)||'';document.getElementById('notesOverlay').style.display='block';}
function closeNotes(){document.getElementById('notesOverlay').style.display='none';}
function saveNotes(){localStorage.setItem(NOTES_KEY,document.getElementById('notesTxt').value);closeNotes();}
function clearNotes(){document.getElementById('notesTxt').value='';}

// ─── LINE READER ───
let lrActive=false,lrY=200;
function toggleLR(){
  lrActive=!lrActive;
  const bar=document.getElementById('lrBar');
  const ctrl=document.getElementById('lrControls');
  if(lrActive){bar.style.display='block';bar.style.top=(lrY-18)+'px';ctrl.style.display='flex';}
  else{bar.style.display='none';ctrl.style.display='none';}
}
function lrMove(dy){lrY=Math.max(60,Math.min(window.innerHeight-60,lrY+dy));document.getElementById('lrBar').style.top=(lrY-18)+'px';}
document.addEventListener('touchstart',function(e){
  if(!lrActive)return;
  const bar=document.getElementById('lrBar');
  const ty=e.touches[0].clientY;
  if(Math.abs(ty-(parseFloat(bar.style.top||'200')+18))<40){
    function onMove(ev){lrY=ev.touches[0].clientY;bar.style.top=(lrY-18)+'px';}
    function onEnd(){document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onEnd);}
    document.addEventListener('touchmove',onMove);
    document.addEventListener('touchend',onEnd);
  }
},{passive:true});

render();
</script>
