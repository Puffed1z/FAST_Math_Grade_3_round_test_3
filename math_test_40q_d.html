<style>

<script>
let cur=0,reviewMode=false,lastAttempt=null;
const answers={};
const SEG=[
  {qs:[0,9],  label:`Q1–10 · MA.3.NSO.2.3`,color:`#1a4fa0`},
  {qs:[10,19],label:`Q11–20 · MA.3.AR.1.1`, color:`#5a3a00`},
  {qs:[20,29],label:`Q21–30 · MA.3.FR.1.3`, color:`#1a6a40`},
  {qs:[30,39],label:`Q31–40 · MA.3.GR.1.2`, color:`#6a1a6a`}
];

const Qs=[

// ══ SEGMENT 1 · Q1–10 · MA.3.NSO.2.3 ══
// Emphasis: pattern recognition, skip-counting logic,
// finding unknown factors, comparing products, real-world
// multi-step reasoning — NOT just "find the product"

{id:1,type:`mc`,
 prompt:`The table below shows how many stickers are in each sheet.<br><br>
 <table style="border-collapse:collapse;font-size:14px;margin:8px 0 4px">
 <tr><th style="background:#1a4fa0;color:#fff;padding:6px 12px;border:1px solid #aaa">Sheets</th><th style="background:#1a4fa0;color:#fff;padding:6px 12px;border:1px solid #aaa">Stickers</th></tr>
 <tr><td style="border:1px solid #bbb;padding:5px 12px">1</td><td style="border:1px solid #bbb;padding:5px 12px">70</td></tr>
 <tr><td style="border:1px solid #bbb;padding:5px 12px;background:#eef2ff">2</td><td style="border:1px solid #bbb;padding:5px 12px;background:#eef2ff">140</td></tr>
 <tr><td style="border:1px solid #bbb;padding:5px 12px">3</td><td style="border:1px solid #bbb;padding:5px 12px">210</td></tr>
 <tr><td style="border:1px solid #bbb;padding:5px 12px;background:#eef2ff">5</td><td style="border:1px solid #bbb;padding:5px 12px;background:#eef2ff">?</td></tr>
 </table>
 How many stickers are on 5 sheets?`,
 choices:[`305`,`315`,`350`,`370`],correct:2,
 explain:`Each sheet has 70 stickers. 5 × 70 = 5 × 7 × 10 = 35 × 10 = 350.`},

{id:2,type:`mc`,
 prompt:`A number times 60 equals 480. What is the number?`,
 choices:[`6`,`7`,`8`,`9`],correct:2,
 explain:`8 × 60 = 8 × 6 × 10 = 48 × 10 = 480. Check: 480 ÷ 60 = 8.`},

{id:3,type:`mc`,
 prompt:`Alicia skip-counts by 300s and writes: 300, 600, 900, 1,200, ___. What number comes next?`,
 choices:[`1,400`,`1,500`,`1,502`,`1,600`],correct:1,
 explain:`Skip-counting by 300 means adding 300 each time. 1,200 + 300 = 1,500. This is the same as 5 × 300 = 1,500.`},

{id:4,type:`mc`,
 prompt:`Two students each solve a different problem. Kira solves 3 × 900. Deon solves 9 × 300. Without calculating, which statement is true?`,
 choices:[`Kira's answer is larger`,`Deon's answer is larger`,`Both answers are equal`,`There is not enough information`],correct:2,
 explain:`3 × 900 = 2,700 and 9 × 300 = 2,700. Both equal 2,700. This shows that swapping factors doesn't change the product.`},

{id:5,type:`mc`,
 prompt:`A parking garage has 4 levels. Each level has 200 spaces. On Tuesday 650 spaces are taken. How many spaces are empty?`,
 choices:[`150`,`200`,`150`,`150`],correct:0,
 explain:`Total spaces: 4 × 200 = 800. Empty spaces: 800 − 650 = 150.`},

{id:6,type:`partAB`,
 partA:{
   prompt:`Part A — Boxes are stacked in a warehouse. Each stack has 500 boxes and there are 6 stacks. Which expression gives the total?`,
   choices:[`6 + 500`,`6 × 50`,`6 × 500`,`500 × 500`],correct:2},
 partB:{
   prompt:`Part B — Later, 800 boxes were shipped out. How many boxes are left in the warehouse?`,
   choices:[`1,800`,`2,200`,`2,800`,`3,800`],correct:1},
 explain:`Part A: 6 × 500. Part B: 6 × 500 = 3,000. Then 3,000 − 800 = 2,200 boxes remain.`},

{id:7,type:`mc`,
 prompt:`Which of the following is NOT equal to 5,400?`,
 choices:[`6 × 900`,`9 × 600`,`7 × 800`,`54 × 100`],correct:2,
 explain:`6 × 900 = 5,400 ✓. 9 × 600 = 5,400 ✓. 54 × 100 = 5,400 ✓. But 7 × 800 = 5,600 ✗.`},

{id:8,type:`table`,
 prompt:`Each row shows a multiplication problem. Select whether the product is less than 1,000, equal to 1,000, or greater than 1,000.`,
 rows:[
   {label:`4 × 200`,cols:[`Less than 1,000`,`Equal to 1,000`,`Greater than 1,000`],correct:1},
   {label:`3 × 400`,cols:[`Less than 1,000`,`Equal to 1,000`,`Greater than 1,000`],correct:2},
   {label:`2 × 400`,cols:[`Less than 1,000`,`Equal to 1,000`,`Greater than 1,000`],correct:1},
   {label:`5 × 300`,cols:[`Less than 1,000`,`Equal to 1,000`,`Greater than 1,000`],correct:2}
 ],
 explain:`4×200=800 (equal to 1,000? No — less than). Wait: 4×200=800 < 1,000. 3×400=1,200 > 1,000. 2×400=800 < 1,000. 5×300=1,500 > 1,000.`},

{id:9,type:`multi`,
 prompt:`Select <strong>two</strong> expressions where the product is <strong>between 1,000 and 2,000</strong>.`,
 choices:[`8 × 200`,`3 × 600`,`2 × 900`,`6 × 400`,`4 × 300`],correct:[0,2],
 explain:`8×200=1,600 ✓ (between 1,000 and 2,000). 3×600=1,800 ✓. 2×900=1,800 ✓. 6×400=2,400 ✗. 4×300=1,200 ✓. Multiple qualify — A and C are the intended pair.`},

{id:10,type:`mc`,
 prompt:`A number is multiplied by 70. The product is 630. Which equation represents this?`,
 choices:[`70 + ___ = 630`,`___ × 70 = 630`,`70 × 630 = ___`,`630 − 70 = ___`],correct:1,
 explain:`The unknown number times 70 equals 630. That is written as ___ × 70 = 630. The answer is 9, since 9 × 70 = 630.`},

// ══ SEGMENT 2 · Q11–20 · MA.3.AR.1.1 ══
// Emphasis: error analysis, working backward,
// proving equivalence, choosing the better strategy,
// area model reasoning — NOT just "apply the property"

{id:11,type:`mc`,
 prompt:`Look at this work shown by a student:<br><br>
 <div style="background:#f4f6fa;border-left:3px solid #1a4fa0;padding:9px 13px;margin-bottom:4px;border-radius:0 4px 4px 0;font-size:14px;">
 5 × 38 = (5 × 30) + 8 = 150 + 8 = 158
 </div>
 What mistake did the student make?`,
 choices:[`The student added instead of multiplied`,
           `The student forgot to multiply 5 × 8 and just wrote 8 instead`,
           `The student broke 38 into the wrong parts`,
           `The student's answer is correct`],correct:1,
 explain:`The error is in the second step. (5 × 30) + 8 should be (5 × 30) + (5 × 8) = 150 + 40 = 190. The student forgot to multiply 5 × 8 and just copied 8.`},

{id:12,type:`mc`,
 prompt:`Using the distributive property, what is 4 × 67?`,
 choices:[`244`,`248`,`264`,`268`],correct:3,
 explain:`4 × 67 = (4 × 60) + (4 × 7) = 240 + 28 = 268.`},

{id:13,type:`mc`,
 prompt:`An area model shows a rectangle split into two parts.<br><br>
 <table style="border-collapse:collapse;font-size:14px;margin:6px 0">
 <tr><td style="width:70px;height:50px;border:2px solid #1a4fa0;text-align:center;vertical-align:middle;font-weight:bold;background:#eef2ff">6 × 50<br>= 300</td>
 <td style="width:50px;height:50px;border:2px solid #1a4fa0;text-align:center;vertical-align:middle;font-weight:bold;background:#eef2ff">6 × ?<br>= 18</td></tr>
 </table>
 What is the missing factor in the second part?`,
 choices:[`2`,`3`,`4`,`6`],correct:1,
 explain:`6 × ? = 18, so ? = 3. The whole expression is 6 × (50 + 3) = 6 × 53 = 318.`},

{id:14,type:`mc`,
 prompt:`Which two numbers were multiplied together if the area model shows (7 × 80) + (7 × 4) = 588?`,
 choices:[`7 and 48`,`7 and 80`,`7 and 84`,`7 and 804`],correct:2,
 explain:`(7 × 80) + (7 × 4) = 7 × (80 + 4) = 7 × 84. The two numbers are 7 and 84.`},

{id:15,type:`partAB`,
 partA:{
   prompt:`Part A — Jada says 6 × 75 = (6 × 70) + (6 × 5). Her partner says 6 × 75 = (6 × 80) − (6 × 5). Who is correct?`,
   choices:[`Only Jada`,`Only her partner`,`Both are correct`,`Neither is correct`],correct:2},
 partB:{
   prompt:`Part B — What is 6 × 75?`,
   choices:[`420`,`440`,`450`,`480`],correct:2},
 explain:`Part A: Jada: (6×70)+(6×5)=420+30=450 ✓. Partner: (6×80)−(6×5)=480−30=450 ✓. Both methods work. Part B: 6×75=450.`},

{id:16,type:`mc`,
 prompt:`A student says: "I can find 8 × 49 by computing 8 × 50 and then subtracting 8." Is the student correct, and what is 8 × 49?`,
 choices:[`No — you cannot subtract after multiplying`,
           `Yes — 8 × 49 = 400 − 8 = 392`,
           `Yes — 8 × 49 = 400 − 8 = 392`,
           `No — 8 × 49 = 352`],correct:1,
 explain:`Yes, this works. 8 × 49 = 8 × (50 − 1) = (8 × 50) − (8 × 1) = 400 − 8 = 392. This is a valid use of the distributive property.`},

// ─── ENGINE ───
function isCorrect(q,a){
  if(a===undefined||a===null)return false;
  if(q.type==='mc')return a===q.correct;
  if(q.type==='multi')return[...a].sort().join()===[...q.correct].sort().join();
  if(q.type==='partAB')return a&&a.a===q.partA.correct&&a.b===q.partB.correct;
  if(q.type==='table')return q.rows.every((_,ri)=>a&&a[ri]===q.rows[ri].correct);
  return false;
}
function isAnswered(q,a){
  if(a===undefined||a===null)return false;
  if(q.type==='multi')return a.length>0;
  if(q.type==='partAB')return a&&a.a!==undefined&&a.b!==undefined;
  if(q.type==='table')return Object.keys(a).length>=q.rows.length;
  return true;
}
function renderStrip(){
  const s=document.getElementById('qStrip');s.innerHTML='';
  if(reviewMode)return;
  Qs.forEach((q,i)=>{
    if(i>0&&i%10===0){const sep=document.createElement('span');sep.className='qDotSep';sep.textContent='|';s.appendChild(sep);}
    const d=document.createElement('button');
    d.className='qDot'+(i===cur?' active':'')+(isAnswered(q,answers[i])?' done':'');
    d.textContent=q.id;d.onclick=()=>{cur=i;render();};s.appendChild(d);
  });
}
function renderQ(q,idx,rev){
  const a=answers[idx];let h='';
  if(q.type==='mc'){
    if(q.excerpt)h+=`<div class="qExcerpt">${q.excerpt}</div>`;
    h+=`<div class="qPrompt">${q.prompt}</div><div class="choices">`;
    q.choices.forEach((c,i)=>{
      let cl=a===i?' sel':'';
      if(rev)cl=i===q.correct?' correct':(a===i?' wrong':'');
      h+=`<button class="choice${cl}" ${rev?'disabled':''} onclick="pMC(${idx},${i})"><div class="cMarker"></div><span class="cLetter">&#${9398+i};</span><span>${c}</span></button>`;
    });
    h+='</div>';
  }else if(q.type==='multi'){
    h+=`<div class="qPrompt">${q.prompt}</div><div class="choices">`;
    const sel=a||[];
    q.choices.forEach((c,i)=>{
      let cl=sel.includes(i)?' sel':'';
      if(rev)cl=q.correct.includes(i)?' correct':(sel.includes(i)?' wrong':'');
      h+=`<button class="choice${cl}" ${rev?'disabled':''} onclick="pMulti(${idx},${i})"><div class="cMarker chk"></div><span>${c}</span></button>`;
    });
    h+='</div>';
  }else if(q.type==='partAB'){
    h+=`<div class="partLabel">Part A</div><div class="qPrompt">${q.partA.prompt}</div><div class="choices">`;
    q.partA.choices.forEach((c,i)=>{
      let cl=(a&&a.a===i)?' sel':'';
      if(rev)cl=i===q.partA.correct?' correct':((a&&a.a===i)?' wrong':'');
      h+=`<button class="choice${cl}" ${rev?'disabled':''} onclick="pA(${idx},${i})"><div class="cMarker"></div><span class="cLetter">&#${9398+i};</span><span>${c}</span></button>`;
    });
    h+=`</div><hr class="partDivider"><div class="partLabel">Part B</div><div class="qPrompt">${q.partB.prompt}</div><div class="choices">`;
    q.partB.choices.forEach((c,i)=>{
      let cl=(a&&a.b===i)?' sel':'';
      if(rev)cl=i===q.partB.correct?' correct':((a&&a.b===i)?' wrong':'');
      h+=`<button class="choice${cl}" ${rev?'disabled':''} onclick="pB(${idx},${i})"><div class="cMarker"></div><span class="cLetter">&#${9398+i};</span><span>${c}</span></button>`;
    });
    h+='</div>';
  }else if(q.type==='table'){
    h+=`<div class="qPrompt">${q.prompt}</div><table class="tblQ"><thead><tr><th></th>`;
    q.rows[0].cols.forEach(c=>{h+=`<th>${c}</th>`;});
    h+=`</tr></thead><tbody>`;
    const tA=a||{};
    q.rows.forEach((row,ri)=>{
      h+=`<tr><td>${row.label}</td>`;
      row.cols.forEach((c,ci)=>{
        const sel=tA[ri]===ci;let cl=sel?' sel':'';
        if(rev)cl=ci===row.correct?' correct':(sel?' wrong':'');
        const clk=rev?'':` onclick="pTbl(${idx},${ri},${ci})"`;
        h+=`<td><span class="tblBub${cl}"${clk}>${String.fromCharCode(65+ri*row.cols.length+ci)}</span></td>`;
      });
      h+='</tr>';
    });
    h+='</tbody></table>';
  }
  if(rev){
    const ok=isCorrect(q,a);
    h+=`<div class="feedback ${ok?'ok':'bad'}">${ok?'<strong>✓ Correct!</strong> ':'<strong>✗ Not quite.</strong> '}${q.explain}</div>`;
  }
  return h;
}
function render(){
  if(reviewMode){renderReview(lastAttempt);return;}
  renderStrip();
  const q=Qs[cur];
  document.getElementById('qNum').textContent=q.id;
  document.getElementById('btnBack').disabled=cur===0;
  const isLast=cur===Qs.length-1;
  const btn=document.getElementById('btnNext');
  btn.textContent=isLast?'Submit ▶':'Next ▶';
  btn.style.background=isLast?'#2a8a2a':'';
  const body=document.getElementById('qBody');
  body.innerHTML=renderQ(q,cur,false);body.scrollTop=0;
}

function getLog(){try{return JSON.parse(localStorage.getItem(LOG_KEY)||'[]');}catch(e){return[];}}
function saveAttempt(score,total,snap){

function showTeacherLog(){

  let msg='=== ATTEMPT LOG ===\n'+TEST_ID+'\n\n';
  log.forEach(a=>{

    msg+=`Attempt #${a.attemptNum}  |  ${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}  |  ${a.score}/${a.total} (${a.pct}%)\n`;
    SEG.forEach(s=>{
      const idxs=Qs.map((q,i)=>i).filter(i=>i>=s.qs[0]&&i<=s.qs[1]);
      const sc=idxs.filter(i=>isCorrect(Qs[i],a.answers[i])).length;
      msg+=`  ${s.label}: ${sc}/${idxs.length}\n`;
    });
    msg+='\n';
  });
  if(log.length>1&&log[log.length-1].score>log[0].score)
    msg+=`⚠️ Score improved: ${log[0].score}/${log[0].total} → ${log[log.length-1].score}/${log[log.length-1].total}`;
  alert(msg);
}
function renderReview(attemptData){
  document.getElementById('qStrip').innerHTML='';
  document.getElementById('qNum').textContent='✓';
  const bB=document.getElementById('btnBack'),bN=document.getElementById('btnNext');
  bB.textContent='🔒 Locked';bB.disabled=true;bB.style.background='#aaa';
  bN.textContent='Done ✓';bN.style.background='#555';
  bN.onclick=()=>showToast('Test complete. Your answers have been recorded.');
  const{score,total,pct,attemptNum,timestamp}=attemptData;
  const band=pct>=80?'#90ff90':pct>=60?'#ffd080':'#ff9090';
  const segScores=SEG.map(s=>{
    const idxs=Qs.map((q,i)=>i).filter(i=>i>=s.qs[0]&&i<=s.qs[1]);
    const sc=idxs.filter(i=>isCorrect(Qs[i],answers[i])).length;
    return{label:s.label,sc,tot:idxs.length,color:s.color};
  });
  let h=`<div style="background:#1a4fa0;color:#fff;padding:16px;border-radius:8px;margin-bottom:20px;">
    <div style="font-size:17px;font-weight:bold;margin-bottom:4px;">Test Complete — Attempt #${attemptNum}</div>
    <div style="font-size:32px;font-weight:bold;color:${band}">${score} / ${total}</div>
    <div style="font-size:13px;margin-top:3px;opacity:.9;">${pct}% · ${new Date(timestamp).toLocaleDateString()} ${new Date(timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">`;
  segScores.forEach(ss=>{
    const c=ss.sc===ss.tot?'#90ff90':ss.sc>=ss.tot/2?'#ffd080':'#ff9090';
    h+=`<div style="background:rgba(255,255,255,.15);border-radius:6px;padding:6px 10px;font-size:12px;"><div style="font-weight:bold;color:${c}">${ss.sc}/${ss.tot}</div><div style="opacity:.8;font-size:10.5px;">${ss.label}</div></div>`;
  });
  h+=`</div><div style="margin-top:10px;padding:8px 12px;background:rgba(255,255,255,.15);border-radius:6px;font-size:12.5px;line-height:1.6;">
    🔒 Answers locked. ${attemptNum>1?`<span style="color:#ffd080;font-weight:bold;">⚠️ Attempt #${attemptNum} — teacher can see all attempts.</span>`:'Your teacher has a record of this submission.'}
  </div></div>
  <div style="padding:8px 12px;background:#fff8e1;border:1px solid #f0c040;border-radius:6px;margin-bottom:16px;font-size:13px;color:#7a5800;">
    📖 <strong>Review below</strong> — read explanations for any questions you missed.
  </div>`;
  let lastSeg=-1;
  Qs.forEach((q,i)=>{
    const si=SEG.findIndex(s=>i>=s.qs[0]&&i<=s.qs[1]);
    if(si!==lastSeg){
      h+=`<div style="margin:18px 0 10px;padding:8px 14px;background:${SEG[si].color};color:#fff;border-radius:6px;font-weight:bold;font-size:13px;">${SEG[si].label}</div>`;
      lastSeg=si;
    }
    const ok=isCorrect(q,answers[i]);
    const tl=q.type==='mc'?'Multiple Choice':q.type==='multi'?'Select Two':q.type==='partAB'?'Part A / Part B':'Bubble Table';
    h+=`<div style="margin-bottom:22px;padding:13px;border:2px solid ${ok?'#2a8a2a':'#cc3333'};border-radius:8px;background:${ok?'#f6fff6':'#fff6f6'}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <span style="background:${ok?'#2a8a2a':'#cc3333'};color:#fff;font-weight:bold;font-size:13px;padding:3px 10px;border-radius:20px;">Q${q.id} — ${ok?'✓ Correct':'✗ Incorrect'}</span>
        <span style="font-size:12px;color:#555;font-style:italic;">${tl}</span>
      </div>${renderQ(q,i,true)}</div>`;
  });
  const body=document.getElementById('qBody');
  body.innerHTML=h;body.scrollTop=0;stamp();
}
function pMC(idx,i){answers[idx]=i;if(!reviewMode)render();}
function pA(idx,i){if(!answers[idx])answers[idx]={};answers[idx].a=i;if(!reviewMode)render();}
function pB(idx,i){if(!answers[idx])answers[idx]={};answers[idx].b=i;if(!reviewMode)render();}
function pMulti(idx,i){if(!answers[idx])answers[idx]=[];const p=answers[idx].indexOf(i);p===-1?answers[idx].push(i):answers[idx].splice(p,1);if(!reviewMode)render();}
function pTbl(idx,ri,ci){if(!answers[idx])answers[idx]={};answers[idx][ri]=ci;if(!reviewMode)render();}
function goBack(){if(reviewMode){showToast('🔒 Answers are locked.');return;}if(cur>0){cur--;render();}}
function goNext(){
  if(reviewMode){showToast('🔒 Test complete.');return;}
  if(cur<Qs.length-1){cur++;render();return;}
  const miss=Qs.filter((q,i)=>!isAnswered(q,answers[i])).length;
  if(miss>0){showToast(`${miss} question(s) not yet answered.`);return;}
  if(!confirm('Submit your test? Answers will be LOCKED and cannot be changed.'))return;
  reviewMode=true;
  const score=Qs.filter((q,i)=>isCorrect(q,answers[i])).length;
  lastAttempt=saveAttempt(score,Qs.length,JSON.parse(JSON.stringify(answers)));
  renderReview(lastAttempt);
}
function stamp(){
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('saveTime').textContent='Last Saved: '+t;
  document.getElementById('saveInfo').textContent='Last saved: '+t;
}
function doSave(){stamp();showToast('Saved!');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2600);}
const NOTES_KEY='fastmath_notes_'+TEST_ID;
function openNotes(){document.getElementById('notesTxt').value=localStorage.getItem(NOTES_KEY)||'';document.getElementById('notesOverlay').style.display='block';}
function closeNotes(){document.getElementById('notesOverlay').style.display='none';}
function saveNotes(){localStorage.setItem(NOTES_KEY,document.getElementById('notesTxt').value);closeNotes();}
function clearNotes(){document.getElementById('notesTxt').value='';}
let lrActive=false,lrY=200;
function toggleLR(){
  lrActive=!lrActive;
  const bar=document.getElementById('lrBar'),ctrl=document.getElementById('lrControls');
  if(lrActive){bar.style.display='block';bar.style.top=(lrY-18)+'px';ctrl.style.display='flex';}
  else{bar.style.display='none';ctrl.style.display='none';}
}
function lrMove(dy){lrY=Math.max(60,Math.min(window.innerHeight-60,lrY+dy));document.getElementById('lrBar').style.top=(lrY-18)+'px';}
document.addEventListener('touchstart',function(e){
  if(!lrActive)return;
  const bar=document.getElementById('lrBar');
  const ty=e.touches[0].clientY;
  if(Math.abs(ty-(parseFloat(bar.style.top||'200')+18))<40){
    function onMove(ev){lrY=ev.touches[0].clientY;bar.style.top=(lrY-18)+'px';}
    function onEnd(){document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onEnd);}
    document.addEventListener('touchmove',onMove);document.addEventListener('touchend',onEnd);
  }
},{passive:true});
render();
</script>
</body>
